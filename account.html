<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ticketing System - Account</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-Gtv0G2o7194gVv60HkRh8HT0W9z1cWObcN6XCMlc7FvMmmtuZhH6Q4L/lqFvJzm4"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles/common.css" />
    <link rel="stylesheet" href="styles/account.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">Ticketing System</div>
      <nav class="nav">
        <a href="dashboard.html" class="nav__link">Dashboard</a>
        <a href="write.html" class="nav__link">Write</a>
        <a href="account.html" class="nav__link nav__link--active">Account</a>
        <a href="login.html" class="nav__link nav__link--cta">Login / Signup</a>
      </nav>
    </header>

    <main class="page page--account">
      <section class="panel container py-4">
        <div class="row justify-content-center">
          <div class="col-lg-8">
            <h1 class="mb-3">My Account</h1>
            <p>Update your personal details and change your password.</p>

            <form class="account-form" action="#" method="post">
              <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input
                  type="text"
                  name="name"
                  class="form-control"
                  placeholder="Your full name"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label">Email</label>
                <input
                  type="email"
                  name="email"
                  class="form-control"
                  placeholder="you@example.com"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label">Username</label>
                <input
                  type="text"
                  name="username"
                  class="form-control"
                  placeholder="Your username"
                  required
                />
              </div>

              <fieldset class="password-fieldset border p-3 rounded mb-3">
                <legend class="float-none w-auto px-2">Change Password</legend>

                <div class="mb-3">
                  <label class="form-label">Current Password</label>
                  <input
                    type="password"
                    name="currentPassword"
                    class="form-control"
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label">New Password</label>
                  <input
                    type="password"
                    name="newPassword"
                    class="form-control"
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label">Confirm New Password</label>
                  <input
                    type="password"
                    name="confirmPassword"
                    class="form-control"
                  />
                </div>
              </fieldset>

              <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                  Update Account
                </button>
                <a href="dashboard.html" class="btn btn-outline-secondary"
                  >Back to Dashboard</a
                >
              </div>
            </form>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>&copy; <span id="year"></span> Ticketing System</p>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
      crossorigin="anonymous"
    ></script>
    <script src="scripts/account.js" defer></script>
  </body>
</html>
