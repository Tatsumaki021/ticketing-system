<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ticketing System - Login / Signup</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-Gtv0G2o7194gVv60HkRh8HT0W9z1cWObcN6XCMlc7FvMmmtuZhH6Q4L/lqFvJzm4"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles/common.css" />
    <link rel="stylesheet" href="styles/login.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">Ticketing System</div>
      <nav class="nav">
        <a href="dashboard.html" class="nav__link">Dashboard</a>
        <a href="write.html" class="nav__link">Write</a>
        <a href="account.html" class="nav__link">Account</a>
        <a href="login.html" class="nav__link nav__link--active nav__link--cta"
          >Login / Signup</a
        >
      </nav>
    </header>

    <main class="page page--login">
      <section class="container py-5">
        <div class="row g-4">
          <div class="col-lg-6">
            <div class="card shadow-sm">
              <div class="card-body">
                <h1 class="h4">Login</h1>
                <p class="text-muted">
                  Already have an account? Sign in to continue.
                </p>

                <form class="auth-form" action="#" method="post">
                  <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input
                      type="email"
                      name="email"
                      class="form-control"
                      placeholder="you@example.com"
                      required
                    />
                  </div>
                  <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input
                      type="password"
                      name="password"
                      class="form-control"
                      placeholder="Enter your password"
                      required
                    />
                  </div>
                  <button type="submit" class="btn btn-primary">Login</button>
                </form>
              </div>
            </div>
          </div>

          <div class="col-lg-6">
            <div class="card shadow-sm border-primary">
              <div class="card-body">
                <h1 class="h4">Signup</h1>
                <p class="text-muted">
                  Create a new account to start tracking tickets immediately.
                </p>

                <form class="auth-form" action="#" method="post">
                  <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input
                      type="text"
                      name="name"
                      class="form-control"
                      placeholder="Your name"
                      required
                    />
                  </div>
                  <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input
                      type="email"
                      name="email"
                      class="form-control"
                      placeholder="you@example.com"
                      required
                    />
                  </div>
                  <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input
                      type="password"
                      name="password"
                      class="form-control"
                      placeholder="Create a password"
                      required
                    />
                  </div>
                  <button type="submit" class="btn btn-outline-primary">
                    Sign Up
                  </button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>&copy; <span id="year"></span> Ticketing System</p>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
      crossorigin="anonymous"
    ></script>
    <script src="scripts/login.js" defer></script>
  </body>
</html>
